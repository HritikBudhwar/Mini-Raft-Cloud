version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - gateway
    networks:
      - raft-network
    restart: unless-stopped

  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - REPLICA_URLS=http://replica1:4001,http://replica2:4002,http://replica3:4003
    volumes:
      - ./gateway:/app
      - /app/node_modules
    depends_on:
      - replica1
      - replica2
      - replica3
    networks:
      - raft-network
    restart: unless-stopped

  replica1:
    build: ./replica1
    ports:
      - "4001:4001"
    environment:
      - NODE_ID=replica1
      - PORT=4001
      - PEERS=http://replica2:4002,http://replica3:4003
      - GATEWAY_URL=http://gateway:3000
    volumes:
      - ./replica1:/app
      - ./replica1/data:/data
      - /app/node_modules
    networks:
      - raft-network
    restart: unless-stopped

  replica2:
    build: ./replica2
    ports:
      - "4002:4002"
    environment:
      - NODE_ID=replica2
      - PORT=4002
      - PEERS=http://replica1:4001,http://replica3:4003
      - GATEWAY_URL=http://gateway:3000
    volumes:
      - ./replica2:/app
      - ./replica2/data:/data
      - /app/node_modules
    networks:
      - raft-network
    restart: unless-stopped

  replica3:
    build: ./replica3
    ports:
      - "4003:4003"
    environment:
      - NODE_ID=replica3
      - PORT=4003
      - PEERS=http://replica1:4001,http://replica2:4002
      - GATEWAY_URL=http://gateway:3000
    volumes:
      - ./replica3:/app
      - ./replica3/data:/data
      - /app/node_modules
    networks:
      - raft-network
    restart: unless-stopped

networks:
  raft-network:
    driver: bridge
